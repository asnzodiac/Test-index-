<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AIX Security – BOM</title>

<meta name="theme-color" content="#000000" />
<link rel="manifest" href="manifest.json" />

<style>
:root {
  --bg:#fff; --text:#000; --hdr:#eee; --th:#333; --tht:#fff;
  --green:#c8f7c5; --yellow:#fff3b0; --red:#f7c5c5; --grey:#e0e0e0;
}
[data-theme="dark"] {
  --bg:#121212; --text:#fff; --hdr:#1f1f1f; --th:#2c2c2c; --tht:#fff;
  --green:#1f4d2b; --yellow:#5c4b00; --red:#5c1f1f; --grey:#333;
}
body {
  background:var(--bg);
  color:var(--text);
  font-family:Arial, sans-serif;
  margin:15px;
}
h2 { background:var(--hdr); padding:8px; }
table { width:100%; border-collapse:collapse; margin-bottom:30px; }
th, td { border:1px solid #666; padding:6px; text-align:center; }
th {
  background:var(--th);
  color:var(--tht);
  position:sticky;
  top:0;
  z-index:2;
}
.controls {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}
button { padding:6px 12px; cursor:pointer; }

.flight-logo {
  height:16px;
  vertical-align:middle;
  margin-right:4px;
}

.onTime { background:var(--green); }
.delay { background:var(--yellow); }
.heavyDelay { background:var(--red); }
.cancelled { background:var(--grey); }
</style>
</head>

<body>

<div class="controls">
  <button id="loadEarlierBtn">Load Earlier Flights</button>
  <button id="themeToggle">Dark Mode</button>
</div>

<h2>Arrivals – BOM</h2>
<table id="arrivals-table">
<thead>
<tr>
  <th>Flight</th><th>Reg</th><th>From</th>
  <th>ETA</th><th>STA</th><th>Aircraft</th><th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Departures – BOM</h2>
<table id="departures-table">
<thead>
<tr>
  <th>Flight</th><th>Reg</th><th>To</th>
  <th>ETD</th><th>STD</th><th>Aircraft</th><th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
/* ================= CONFIG ================= */
const AIRPORT = "bom";
const BRANDFETCH_CLIENT_ID = "1idBLQ1djCDndBUmUVs";
const baseUrl = `https://api.flightradar24.com/common/v1/airport.json?code=${AIRPORT}`;
let baseTimestamp = Math.floor(Date.now() / 1000);
let loadedTimestamps = new Set();

/* ================= HELPERS ================= */
const toTime = t =>
  t ? new Date(t * 1000).toLocaleTimeString("en-IN", {
    timeZone:"Asia/Kolkata", hour:"2-digit", minute:"2-digit", hour12:false
  }) : "-";

const airlineAllowed = fn =>
  ["IX","UL","J9","VZ","UR","3U","7L"].some(a => fn.startsWith(a));

const getLogo = fn => {
  let d="", f="png";
  if (fn.startsWith("IX")) d="airindiaexpress.com";
  if (fn.startsWith("UL")) d="srilankan.com";
  if (fn.startsWith("J9")) d="jazeeraairways.com";
  if (fn.startsWith("VZ")) { d="vietjetair.com"; f="svg"; }
  if (fn.startsWith("UR")) { d="ugandaairlines.com"; f="svg"; }
  if (fn.startsWith("3U")) d="sichuanair.com";
  if (fn.startsWith("7L")) d="silkwaywest.com";
  return d ? `https://cdn.brandfetch.io/${d}/logo.${f}?w=400&h=120&c=${BRANDFETCH_CLIENT_ID}` : "";
};

const delayMinutes = (s,e) => s && e ? Math.round((e - s)/60) : 0;

const rowClass = (status, delay) => {
  const s = status.toLowerCase();
  if (s.includes("cancel") || s.includes("divert")) return "cancelled";
  if (delay > 30) return "heavyDelay";
  if (delay > 5) return "delay";
  return "onTime";
};

const getEndpoint = (type, ts) =>
  `${baseUrl}&plugin-setting[schedule][mode]=${type}&plugin-setting[schedule][timestamp]=${ts}&limit=100`;

const sortTable = id => {
  const rows = Array.from(document.querySelector(`#${id} tbody`).rows);
  rows.sort((a,b) =>
    (parseInt(a.dataset.est||a.dataset.sch||0)) -
    (parseInt(b.dataset.est||b.dataset.sch||0))
  );
  rows.forEach(r => r.parentNode.appendChild(r));
};

/* ================= LOAD ================= */
async function loadFlights(type, ts, append=true) {
  const key = type + ts;
  if (loadedTimestamps.has(key)) return;
  loadedTimestamps.add(key);

  const res = await fetch(getEndpoint(type, ts));
  const data = await res.json();
  const flights = data?.result?.response?.airport?.pluginData?.schedule?.[type]?.data || [];
  const tbody = document.querySelector(`#${type}-table tbody`);
  if (!append) tbody.innerHTML = "";

  const fragment = document.createDocumentFragment();

  flights.forEach(f => {
    const fl = f.flight;
    const fn = fl?.identification?.number?.default || "";
    if (!airlineAllowed(fn)) return;

    const isDep = type === "departures";
    const sch = isDep ? fl.time.scheduled?.departure : fl.time.scheduled?.arrival;
    const est = isDep ? fl.time.estimated?.departure : fl.time.estimated?.arrival;
    const act = isDep ? fl.time.actual?.departure : fl.time.actual?.arrival;

    const delay = delayMinutes(sch, est);
    let status = fl.status?.text || "-";
    if (act && status === "-") status = isDep ? "DEPARTED" : "LANDED";

    const tr = document.createElement("tr");
    tr.className = rowClass(status, delay);
    tr.dataset.sch = sch || 0;
    tr.dataset.est = est || 0;

    tr.innerHTML = `
      <td><img class="flight-logo" src="${getLogo(fn)}">${fn}</td>
      <td>${fl.aircraft?.registration || "-"}</td>
      <td>${isDep ? fl.airport.destination?.code?.iata : fl.airport.origin?.code?.iata}</td>
      <td>${toTime(est)} ${delay>0?`(+${delay})`:""}</td>
      <td>${toTime(sch)}</td>
      <td>${fl.aircraft?.model?.text || "-"}</td>
      <td>${status}</td>
    `;
    fragment.appendChild(tr);
  });

  tbody.appendChild(fragment);
  sortTable(`${type}-table`);
}

/* ================= INIT ================= */
async function loadInitial() {
  const now = Math.floor(Date.now()/1000);
  for (let i=-1;i<=2;i++) {
    const ts = now + i*6*3600;
    await Promise.all([
      loadFlights("arrivals", ts),
      loadFlights("departures", ts)
    ]);
  }
}

loadInitial();

/* refresh only current window */
setInterval(() => {
  const ts = Math.floor(Date.now()/1000);
  loadFlights("arrivals", ts, false);
  loadFlights("departures", ts, false);
}, 60000);

/* ================= CONTROLS ================= */
document.getElementById("loadEarlierBtn").onclick = () => {
  baseTimestamp -= 6*3600;
  loadFlights("arrivals", baseTimestamp);
  loadFlights("departures", baseTimestamp);
};

/* theme persistence */
const savedTheme = localStorage.getItem("theme");
if (savedTheme) document.documentElement.dataset.theme = savedTheme;

document.getElementById("themeToggle").onclick = () => {
  const t = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  document.documentElement.dataset.theme = t;
  localStorage.setItem("theme", t);
};

/* ================= SERVICE WORKER ================= */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>

</body>
</html>
