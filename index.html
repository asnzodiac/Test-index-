<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>AIX Security – BOM</title>
<meta name="theme-color" content="#000000"/>
<meta name="description" content="AIX Security Flight Dashboard – Mumbai (BOM)"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>AIX Security - BOM</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<style>
:root {
  --bg: #0f172a;
  --card: #1e2937;
  --text: #f1f5f9;
  --accent: #22c55e;
  --border: #334155;
}

* { box-sizing: border-box; margin:0; padding:0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 13px;
  line-height: 1.3;
}

.header {
  background: #1e2937;
  padding: 12px 16px;
  font-size: 17px;
  font-weight: 600;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  background: #1e2937;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}

.btn {
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid #475569;
  background: #334155;
  color: white;
  font-size: 12px;
}

.table-container {
  padding: 8px 8px 20px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
  background: var(--card);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
}

th, td {
  padding: 7px 4px;
  text-align: center;
  border-bottom: 1px solid #334155;
  vertical-align: middle;
}

th {
  background: #334155;
  font-weight: 600;
  color: #cbd5e1;
  font-size: 12px;
  padding: 8px 4px;
}

td {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.flight-logo {
  height: 16px;
  vertical-align: middle;
  margin-right: 4px;
}

.status {
  font-weight: 500;
}

.estimated { color: #86efac; }
.scheduled { color: #4ade80; }
.delayed { color: #fbbf24; }

/* Make it compact */
@media (max-width: 480px) {
  th, td { padding: 6px 3px; font-size: 12px; }
  .flight-logo { height: 14px; margin-right: 3px; }
}
</style>
</head>
<body>

  <div class="header">AIX Security – BOM</div>

  <div class="controls">
    <div>
      <button class="btn" id="proxyToggleBtn">Proxy: Auto</button>
      <button class="btn" id="themeToggle">Theme</button>
    </div>
    <div id="statusText" style="font-size:12px; color:#94a3b8;">Live</div>
  </div>

  <!-- ARRIVALS -->
  <div class="table-container">
    <div style="background:#1e2937; padding:8px 12px; font-weight:600; font-size:15px; margin-bottom:6px; border-radius:6px;">
      ARRIVALS – BOM
    </div>
    <table id="arrivals-table">
      <thead>
        <tr>
          <th>Flight</th>
          <th>Reg</th>
          <th>From</th>
          <th>ETA</th>
          <th>STA</th>
          <th>Aircraft</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- DEPARTURES -->
  <div class="table-container">
    <div style="background:#1e2937; padding:8px 12px; font-weight:600; font-size:15px; margin:12px 0 6px; border-radius:6px;">
      DEPARTURES – BOM
    </div>
    <table id="departures-table">
      <thead>
        <tr>
          <th>Flight</th>
          <th>Reg</th>
          <th>To</th>
          <th>ETD</th>
          <th>STD</th>
          <th>Aircraft</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

<script>
// ================= CONFIG =================
const AIRPORT = "bom";
const BRANDFETCH_CLIENT_ID = "1idBLQ1djCDndBUmUVs";
const baseUrl = `https://api.flightradar24.com/common/v1/airport.json?code=${AIRPORT}`;

const ALLOWED_AIRLINES = ["IX", "UL", "J9", "VZ", "UR", "3U", "7L"];

let proxyMode = localStorage.getItem('bom_proxy_mode') || 'auto';
const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);

// ================= HELPERS =================
const getEndpoint = (type, ts) => 
  `${baseUrl}&plugin-setting[schedule][mode]=${type}&plugin-setting[schedule][timestamp]=${ts}&limit=100`;

const toTime = t => {
  if (!t) return "-";
  return new Date(t * 1000).toLocaleTimeString("en-IN", {
    timeZone: "Asia/Kolkata",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  });
};

const getLogo = fn => {
  let domain = "";
  if (fn.startsWith("IX")) domain = "airindiaexpress.com";
  if (fn.startsWith("UL")) domain = "srilankan.com";
  if (fn.startsWith("J9")) domain = "jazeeraairways.com";
  if (fn.startsWith("VZ") || fn.startsWith("VJ")) domain = "vietjetair.com";
  if (fn.startsWith("UR")) domain = "ugandaairlines.com";
  if (fn.startsWith("3U")) domain = "sichuanair.com";
  if (fn.startsWith("7L")) domain = "silkwaywest.com";
  if (!domain) return "";
  return `https://cdn.brandfetch.io/${domain}/logo.png?w=400&h=120&c=${BRANDFETCH_CLIENT_ID}`;
};

const delayMinutes = (sch, est) => (sch && est) ? Math.round((est - sch)/60) : 0;

const getStatusClass = (status, delay) => {
  if (status?.toLowerCase().includes("cancel")) return "text-gray-400";
  if (delay > 30) return "text-orange-400";
  if (delay > 5) return "text-amber-400";
  return "text-emerald-400";
};

// ================= FETCH LOGIC =================
async function fetchJsonSmart(url) {
  const attempts = [
    {name: 'direct', url},
    {name: 'corsproxy', url: `https://corsproxy.io/?${encodeURIComponent(url)}`},
    {name: 'allorigins', url: `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`}
  ];

  for (const attempt of attempts) {
    try {
      const res = await fetch(attempt.url, {cache: 'no-store'});
      if (!res.ok) continue;
      const text = await res.text();
      const json = JSON.parse(text.slice(text.indexOf('{'), text.lastIndexOf('}')+1));
      return json;
    } catch(e) {}
  }
  throw new Error("Failed to fetch");
}

// ================= LOAD FLIGHTS =================
async function loadFlights(type) {
  const tbody = document.getElementById(type + '-table').querySelector('tbody');
  tbody.innerHTML = '';

  const now = Math.floor(Date.now()/1000);
  const timestamps = Array.from({length: 5}, (_, i) => now + (i-1)*6*3600);

  for (const ts of timestamps) {
    try {
      const url = getEndpoint(type, ts);
      const json = await fetchJsonSmart(url);
      
      const flights = json?.result?.response?.airport?.pluginData?.schedule?.[type]?.data || [];

      flights.forEach(f => {
        const fl = f.flight;
        const fn = fl?.identification?.number?.default || "";
        if (!fn) return;

        const prefix = fn.replace(/\d+/,'').toUpperCase();
        if (!ALLOWED_AIRLINES.includes(prefix)) return;

        const isDep = type === "departures";
        const sch = isDep ? fl.time.scheduled?.departure : fl.time.scheduled?.arrival;
        const est = isDep ? fl.time.estimated?.departure : fl.time.estimated?.arrival;
        const act = isDep ? fl.time.actual?.departure : fl.time.actual?.arrival;

        if (!sch && !est) return;

        const dly = delayMinutes(sch, est);
        const statusText = fl.status?.text || (est ? "Estimated" : "Scheduled");

        const tr = document.createElement('tr');
        const logo = getLogo(fn);

        tr.innerHTML = `
          <td>${logo ? `<img src="${logo}" class="flight-logo">` : ''}${fn}</td>
          <td>${fl.aircraft?.registration || '-'}</td>
          <td>${isDep ? (fl.airport.destination?.code?.iata || '-') : (fl.airport.origin?.code?.iata || '-')}</td>
          <td>${est ? toTime(est) : '-'}</td>
          <td>${toTime(sch)}</td>
          <td>${fl.aircraft?.model?.text || '-'}</td>
          <td class="status ${getStatusClass(statusText, dly)}">${statusText}</td>
        `;

        tbody.appendChild(tr);
      });
    } catch(e) {}
  }
}

// ================= INIT =================
async function init() {
  await Promise.all([
    loadFlights("arrivals"),
    loadFlights("departures")
  ]);
}

document.getElementById('proxyToggleBtn').addEventListener('click', () => {
  proxyMode = proxyMode === 'auto' ? 'on' : 'auto';
  localStorage.setItem('bom_proxy_mode', proxyMode);
  alert('Proxy mode changed. Refreshing...');
  init();
});

document.getElementById('themeToggle').addEventListener('click', () => {
  document.body.style.background = document.body.style.background === 'rgb(15, 23, 42)' ? '#fff' : '#0f172a';
});

init();
setInterval(init, 45000);   // Refresh every 45 seconds
</script>
</body>
</html>
